<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>KiowaGrains</title>

  <style>

    body {

      margin: 0;

      background-color: #0f0f0f;

      color: #f5f5f5;

      font-family: Helvetica, Arial, sans-serif;

      overflow-x: hidden;

    }

    .hero {

      height: 100vh;

      display: flex;

      flex-direction: column;

      justify-content: center;

      align-items: center;

      text-align: center;

      background:

        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.65)),

        url('https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?q=80&w=1400&auto=format&fit=crop');

      background-size: cover;

      background-position: center;

    }

    h1 {

      font-size: 3rem;

      letter-spacing: 8px;

      margin: 0;

      font-weight: 300;

    }

    .subtitle {

      margin-top: 20px;

      color: #c2c2c2;

      letter-spacing: 3px;

      font-size: 0.9rem;

    }

    .gallery {

      

  padding: 40px 12px;

  max-width: 850px;

  margin: auto;

    }

    .gallery img { 

      

  width: 100%;

  margin-bottom: 18px;

  display: block;

  filter: grayscale(10%);

  transition: 0.4s ease;

      .gallery img {

  width: 100%;

  height: auto;

  display: block;

  filter: grayscale(20%);

  transition: 0.4s ease;

    }

    .gallery img:hover {

      transform: scale(1.02);

      filter: grayscale(0%);

    }

    footer {

      text-align: center;

      padding: 40px;

      color: #777;

      font-size: 0.8rem;

      letter-spacing: 2px;

    }

  </style>

</head>

<body>

  <section class="hero">

    <h1>KIOWAGRAINS</h1>

    <div class="subtitle">

      FILM • LIGHT • MEMORY

    </div>

  </section>

  <section class="gallery">

    <img src=IMG_8557.jpeg

    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=1200&auto=format&fit=crop">

    <img src="https://images.unsplash.com/photo-1493246507139-91e8fad9978e?q=80&w=1200&auto=format&fit=crop">

  </section>

  <footer>

    KIOWAGRAINS © 2026

  </footer>

</body>

</html>
